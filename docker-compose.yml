version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitscore-app
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - DATABASE_URL=sqlite+aiosqlite:///./data/fitscore.db
      - DATABASE_URL_SYNC=sqlite:///./data/fitscore.db
    volumes:
      - fitscore-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - fitscore-network
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: fitscore-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - fitscore-network

  # Development service with auto-reload (optional)
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitscore-dev
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key
      - DATABASE_URL=sqlite+aiosqlite:///./data/fitscore.db
      - DATABASE_URL_SYNC=sqlite:///./data/fitscore.db
    volumes:
      - .:/app
      - fitscore-data:/app/data
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    profiles:
      - dev
    networks:
      - fitscore-network

volumes:
  fitscore-data:
    driver: local

networks:
  fitscore-network:
    driver: bridge
