{% extends "base.html" %}

{% block title %}Competencias - Admin - FitScore{% endblock %}

{% block content %}
<div x-data="competitionsPage()" x-init="loadCompetitions()">
    <!-- Header -->
    <div class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Competencias</h1>
            <p class="text-gray-600">Gestiona todas las competencias</p>
        </div>
        <button @click="openModal()" class="px-4 py-2 bg-primary-600 text-white rounded-md hover:bg-primary-700">
            Nueva Competencia
        </button>
    </div>

    <!-- Competitions List -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Fecha</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ubicacion</th>
                    <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Atletas</th>
                    <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">WODs</th>
                    <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Estado</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Acciones</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <template x-for="comp in competitions" :key="comp.id">
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4">
                            <a :href="'/admin/competitions/' + comp.id" class="text-primary-600 hover:text-primary-900 font-medium" x-text="comp.name"></a>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-500" x-text="formatDate(comp.date)"></td>
                        <td class="px-6 py-4 text-sm text-gray-500" x-text="comp.location || '-'"></td>
                        <td class="px-6 py-4 text-sm text-gray-500 text-center" x-text="comp.athlete_count"></td>
                        <td class="px-6 py-4 text-sm text-gray-500 text-center" x-text="comp.wod_count"></td>
                        <td class="px-6 py-4 text-center">
                            <span :class="comp.is_active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'"
                                  class="px-2 py-1 text-xs font-semibold rounded-full"
                                  x-text="comp.is_active ? 'Activa' : 'Inactiva'"></span>
                        </td>
                        <td class="px-6 py-4 text-right text-sm">
                            <button @click="editCompetition(comp)" class="text-primary-600 hover:text-primary-900 mr-2">Editar</button>
                            <button @click="deleteCompetition(comp.id)" class="text-red-600 hover:text-red-900">Eliminar</button>
                        </td>
                    </tr>
                </template>
                <tr x-show="competitions.length === 0 && !loading">
                    <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                        No hay competencias registradas. Crea una nueva para comenzar.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Modal -->
    <div x-show="showModal" x-cloak class="fixed inset-0 z-50 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="closeModal()"></div>

            <div class="relative bg-white rounded-lg shadow-xl max-w-md w-full">
                <div class="px-6 py-4 border-b">
                    <h3 class="text-lg font-medium text-gray-900" x-text="editingId ? 'Editar Competencia' : 'Nueva Competencia'"></h3>
                </div>

                <form @submit.prevent="saveCompetition()">
                    <div class="px-6 py-4 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Nombre *</label>
                            <input type="text" x-model="form.name" required
                                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Fecha *</label>
                            <input type="date" x-model="form.date" required
                                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Ubicacion</label>
                            <input type="text" x-model="form.location"
                                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Descripcion</label>
                            <textarea x-model="form.description" rows="3"
                                      class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary-500 focus:ring-primary-500"></textarea>
                        </div>

                        <div x-show="editingId" class="flex items-center">
                            <input type="checkbox" x-model="form.is_active" id="is_active"
                                   class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-gray-300 rounded">
                            <label for="is_active" class="ml-2 block text-sm text-gray-900">Competencia activa</label>
                        </div>

                        <div x-show="error" class="p-3 bg-red-100 text-red-700 rounded-md text-sm" x-text="error"></div>
                    </div>

                    <div class="px-6 py-4 border-t bg-gray-50 flex justify-end space-x-3">
                        <button type="button" @click="closeModal()" class="px-4 py-2 text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">
                            Cancelar
                        </button>
                        <button type="submit" :disabled="saving" class="px-4 py-2 bg-primary-600 text-white rounded-md hover:bg-primary-700 disabled:opacity-50">
                            <span x-show="!saving" x-text="editingId ? 'Actualizar' : 'Crear'"></span>
                            <span x-show="saving">Guardando...</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function competitionsPage() {
    return {
        competitions: [],
        loading: false,
        showModal: false,
        saving: false,
        error: '',
        editingId: null,
        form: {
            name: '',
            date: '',
            location: '',
            description: '',
            is_active: true
        },

        async loadCompetitions() {
            this.loading = true;
            try {
                const res = await fetch('/api/admin/competitions');
                const data = await res.json();
                this.competitions = data.items || [];
            } catch (e) {
                console.error('Error:', e);
            }
            this.loading = false;
        },

        openModal() {
            this.editingId = null;
            this.form = { name: '', date: '', location: '', description: '', is_active: true };
            this.error = '';
            this.showModal = true;
        },

        editCompetition(comp) {
            this.editingId = comp.id;
            this.form = {
                name: comp.name,
                date: comp.date,
                location: comp.location || '',
                description: comp.description || '',
                is_active: comp.is_active
            };
            this.error = '';
            this.showModal = true;
        },

        closeModal() {
            this.showModal = false;
            this.editingId = null;
            this.error = '';
        },

        async saveCompetition() {
            this.saving = true;
            this.error = '';

            try {
                const url = this.editingId
                    ? `/api/admin/competitions/${this.editingId}`
                    : '/api/admin/competitions';
                const method = this.editingId ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.form)
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || 'Error al guardar');
                }

                this.closeModal();
                await this.loadCompetitions();
            } catch (e) {
                this.error = e.message;
            }
            this.saving = false;
        },

        async deleteCompetition(id) {
            if (!confirm('Estas seguro de eliminar esta competencia? Se eliminaran todos los atletas, WODs y scores asociados.')) {
                return;
            }

            try {
                const res = await fetch(`/api/admin/competitions/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Error al eliminar');
                await this.loadCompetitions();
            } catch (e) {
                alert('Error al eliminar la competencia');
            }
        },

        formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('es-ES', {
                year: 'numeric', month: 'long', day: 'numeric'
            });
        }
    }
}
</script>
{% endblock %}
